<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universal Intent Bridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --text: #e2e8f0;
      --muted: #64748b;
      --critical: #ef4444;
      --high: #f97316;
      --medium: #eab308;
      --low: #22c55e;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    header { border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 0.75rem; }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text h1 { font-size: 1.1rem; font-weight: 700; }
    .logo-text p { font-size: 0.75rem; color: var(--muted); }
    .status-badge { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; padding: 0.35rem 0.75rem; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .status-dot.online { background: var(--low); box-shadow: 0 0 8px var(--low); }
    .status-dot.offline { background: var(--critical); }

    main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    .scenarios { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
    @media(max-width: 600px) { .scenarios { grid-template-columns: 1fr; } }
    .scenario-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; text-align: left; cursor: pointer; transition: border-color 0.2s, background 0.2s; color: var(--text); }
    .scenario-btn:hover { border-color: var(--accent); background: #16162a; }
    .scenario-btn .s-icon { font-size: 1.3rem; margin-bottom: 0.25rem; }
    .scenario-btn .s-title { font-size: 0.85rem; font-weight: 600; }
    .scenario-btn .s-desc { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }

    .input-section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .input-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
    textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem; color: var(--text); font-size: 0.9rem; resize: vertical; min-height: 120px; font-family: inherit; outline: none; transition: border-color 0.2s; }
    textarea:focus { border-color: var(--accent); }

    .input-row { display: flex; gap: 0.75rem; margin-top: 0.75rem; align-items: center; flex-wrap: wrap; }
    .file-btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.5rem 0.85rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 0.8rem; color: var(--muted); transition: all 0.2s; }
    .file-btn:hover { border-color: var(--accent); color: var(--text); }
    .file-btn.active { border-color: var(--accent); color: var(--accent); }
    .file-input { display: none; }
    .record-btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.5rem 0.85rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 0.8rem; color: var(--muted); transition: all 0.2s; }
    .record-btn.recording { border-color: var(--critical); color: var(--critical); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .submit-btn { margin-left: auto; padding: 0.6rem 1.5rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: opacity 0.2s, transform 0.1s; }
    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .loading { display: none; text-align: center; padding: 3rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result { display: none; }
    .result-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.25rem; }
    .domain-badge { padding: 0.3rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; background: #1e1e3a; border: 1px solid var(--accent); color: var(--accent); }
    .severity-badge { padding: 0.3rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
    .severity-CRITICAL { background: #2d0a0a; color: var(--critical); border: 1px solid var(--critical); }
    .severity-HIGH { background: #2d1500; color: var(--high); border: 1px solid var(--high); }
    .severity-MEDIUM { background: #2d2500; color: var(--medium); border: 1px solid var(--medium); }
    .severity-LOW { background: #0a2d0a; color: var(--low); border: 1px solid var(--low); }
    .intent-summary { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 8px; padding: 1rem; margin-bottom: 1.25rem; font-size: 0.95rem; line-height: 1.5; }

    .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.75rem; font-weight: 600; }
    .actions-grid { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 1.25rem; }
    .action-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; display: grid; grid-template-columns: auto 1fr; gap: 0.75rem; align-items: start; }
    .action-card:hover { border-color: #2e2e4e; }
    .step-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
    .step-CRITICAL { background: #2d0a0a; color: var(--critical); border: 1px solid var(--critical); }
    .step-HIGH { background: #2d1500; color: var(--high); border: 1px solid var(--high); }
    .step-MEDIUM { background: #2d2500; color: var(--medium); border: 1px solid var(--medium); }
    .step-LOW { background: #0a2d0a; color: var(--low); border: 1px solid var(--low); }
    .action-what { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.4rem; }
    .action-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .meta-chip { font-size: 0.73rem; padding: 0.2rem 0.55rem; border-radius: 4px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); }
    .meta-chip span { color: var(--text); }

    .verification-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; margin-bottom: 1.25rem; }
    .confidence-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
    .confidence-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .confidence-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.5s ease; }
    .confidence-val { font-size: 0.85rem; font-weight: 700; min-width: 3rem; text-align: right; }
    .verified-yes { color: var(--low); } .verified-no { color: var(--critical); }
    .gap-list, .warn-list { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.5rem; }
    .gap-item { font-size: 0.8rem; padding: 0.4rem 0.65rem; background: #1a1020; border: 1px solid #3d1a3d; border-radius: 6px; color: #c084fc; }
    .warn-item { font-size: 0.8rem; padding: 0.4rem 0.65rem; background: #1a1000; border: 1px solid #3d2d00; border-radius: 6px; color: var(--medium); }

    .error-box { background: #1a0a0a; border: 1px solid var(--critical); border-radius: 10px; padding: 1rem; color: var(--critical); font-size: 0.85rem; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">
        <h1>Universal Intent Bridge</h1>
        <p>Messy input → Verified action plan</p>
      </div>
    </div>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Checking...</span>
    </div>
  </header>

  <main>
    <div class="scenarios">
      <button class="scenario-btn" onclick="loadScenario('medical')">
        <div class="s-icon">🏥</div>
        <div class="s-title">Medical Emergency</div>
        <div class="s-desc">Unconscious patient, possible stroke</div>
      </button>
      <button class="scenario-btn" onclick="loadScenario('disaster')">
        <div class="s-icon">🌊</div>
        <div class="s-title">Disaster Coordination</div>
        <div class="s-desc">Flood evacuation WhatsApp messages</div>
      </button>
      <button class="scenario-btn" onclick="loadScenario('mental')">
        <div class="s-icon">🧠</div>
        <div class="s-title">Mental Health Crisis</div>
        <div class="s-desc">Distress message at 2am</div>
      </button>
      <button class="scenario-btn" onclick="loadScenario('legal')">
        <div class="s-icon">⚖️</div>
        <div class="s-title">Legal Notice</div>
        <div class="s-desc">Cheque bounce Section 138 notice</div>
      </button>
    </div>

    <div class="input-section">
      <div class="input-label">Describe the situation (text, or attach image/audio)</div>
      <textarea id="textInput" placeholder="Paste messy text, describe a scene, paste a WhatsApp thread, medical notes..."></textarea>
      <div class="input-row">
        <label class="file-btn" id="imageLabel">
          📷 Image
          <input type="file" class="file-input" id="imageInput" accept="image/*" onchange="onFileChange('image')">
        </label>
        <label class="file-btn" id="audioLabel">
          🎵 Audio
          <input type="file" class="file-input" id="audioInput" accept="audio/*" onchange="onFileChange('audio')">
        </label>
        <button class="record-btn" id="recordBtn" onclick="toggleRecording()">🎙 Record</button>
        <button class="submit-btn" id="submitBtn" onclick="submit()">Bridge Intent ⚡</button>
      </div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="color:var(--muted);font-size:0.9rem;">Gemini is analyzing your input...</p>
    </div>

    <div class="result" id="result">
      <div class="result-header">
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          <span class="domain-badge" id="domainBadge"></span>
          <span class="severity-badge" id="severityBadge"></span>
        </div>
        <span style="font-size:0.75rem;color:var(--muted);" id="timestamp"></span>
      </div>
      <div class="intent-summary" id="intentSummary"></div>
      <div class="section-title">Action Plan</div>
      <div class="actions-grid" id="actionsGrid"></div>
      <div class="section-title">Verification Report</div>
      <div class="verification-card" id="verificationCard"></div>
    </div>
  </main>

  <script>
    const SCENARIOS = {
      medical: "Patient brought in at 11:45pm. Male, approx 58 yrs. Found unconscious near bus stop on MG Road. No ID on him. Bystander says he collapsed suddenly, may have hit his head. Breathing is shallow, pulse weak. Left side of face drooping. Not responding to name. Someone said he looked confused and was slurring words 20 mins before collapsing. No visible bleeding. Unknown medical history, no phone found. Ambulance en route but 15 min away. We have a first aid kit and AED on site.",
      disaster: "pls help water level rising fast in sector 7 and 12!! families stuck on rooftops. old age home on main street also flooded ground floor. we have 2 boats but need more. roads blocked cant reach. children and elderly priority. last update 40 min ago things getting worse. contact raj 9876543210 he knows the area",
      mental: "its 2am and i cant stop crying. i dont see the point anymore. i lost my job last week and my girlfriend left. i havent eaten in 2 days. i keep thinking everyone would be better off. i have pills in my drawer and i keep looking at them. i dont know why im even sending this",
      legal: "received notice under section 138 NI act. cheque of rs 4,50,000 bounced dated 15 jan 2026. notice received 28 jan 2026. demand notice says pay within 15 days or face criminal complaint. i gave the cheque for a personal loan taken in 2024. i have some payment proofs. what do i do"
    };

    let mediaRecorder = null;
    let audioChunks = [];
    let recordedBlob = null;

    async function checkHealth() {
      try {
        const r = await fetch('/api/health');
        const d = await r.json();
        const dot = document.getElementById('statusDot');
        const txt = document.getElementById('statusText');
        if (d.status === 'ok') {
          dot.className = 'status-dot online';
          txt.textContent = 'Backend Connected';
        } else {
          dot.className = 'status-dot offline';
          txt.textContent = 'Backend Error';
        }
      } catch {
        document.getElementById('statusDot').className = 'status-dot offline';
        document.getElementById('statusText').textContent = 'Backend Offline';
      }
    }

    function loadScenario(key) {
      document.getElementById('textInput').value = SCENARIOS[key];
    }

    function onFileChange(type) {
      const el = document.getElementById(type + 'Label');
      const input = document.getElementById(type + 'Input');
      if (input.files[0]) {
        el.classList.add('active');
        el.childNodes[0].textContent = (type === 'image' ? '📷 ' : '🎵 ') + input.files[0].name.slice(0, 12) + '…';
      }
    }

    async function toggleRecording() {
      const btn = document.getElementById('recordBtn');
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        btn.classList.remove('recording');
        btn.textContent = '🎙 Record';
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
          btn.textContent = '🎙 Recorded ✓';
          stream.getTracks().forEach(t => t.stop());
        };
        mediaRecorder.start();
        btn.classList.add('recording');
        btn.textContent = '⏹ Stop';
      } catch {
        alert('Microphone access denied');
      }
    }

    async function submit() {
      const text = document.getElementById('textInput').value.trim();
      const imageFile = document.getElementById('imageInput').files[0];
      const audioFile = document.getElementById('audioInput').files[0];
      if (!text && !imageFile && !audioFile && !recordedBlob) {
        showError('Please enter text or attach an image/audio file.');
        return;
      }

      setLoading(true);
      hideError();
      document.getElementById('result').style.display = 'none';

      const fd = new FormData();
      if (text) fd.append('text_input', text);
      if (imageFile) fd.append('image_file', imageFile);
      if (audioFile) fd.append('audio_file', audioFile);
      else if (recordedBlob) fd.append('audio_file', recordedBlob, 'recording.webm');

      try {
        const r = await fetch('/api/bridge', { method: 'POST', body: fd });
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || 'Unknown error');
        renderResult(data);
      } catch (e) {
        showError(e.message);
      } finally {
        setLoading(false);
      }
    }

    function renderResult(d) {
      document.getElementById('domainBadge').textContent = d.domain;
      const sb = document.getElementById('severityBadge');
      sb.textContent = d.severity;
      sb.className = 'severity-badge severity-' + d.severity;
      document.getElementById('intentSummary').textContent = d.intent_summary;
      document.getElementById('timestamp').textContent = new Date(d.timestamp).toLocaleString();

      const grid = document.getElementById('actionsGrid');
      grid.innerHTML = d.actions.map(a => `
        <div class="action-card">
          <div class="step-num step-${a.priority}">${a.step_number}</div>
          <div>
            <div class="action-what">${a.what}</div>
            <div class="action-meta">
              <div class="meta-chip">👤 <span>${a.who}</span></div>
              <div class="meta-chip">⏱ <span>${a.when}</span></div>
              <div class="meta-chip">📡 <span>${a.via}</span></div>
            </div>
          </div>
        </div>`).join('');

      const v = d.verification;
      const pct = Math.round(v.confidence_score * 100);
      const color = pct >= 80 ? 'var(--low)' : pct >= 60 ? 'var(--medium)' : 'var(--critical)';
      let html = `
        <div class="confidence-row">
          <div class="confidence-bar"><div class="confidence-fill" style="width:${pct}%;background:${color}"></div></div>
          <div class="confidence-val" style="color:${color}">${pct}%</div>
          <div style="font-size:0.8rem;" class="${v.verified ? 'verified-yes' : 'verified-no'}">${v.verified ? '✓ Verified' : '✗ Unverified'}</div>
        </div>`;
      if (v.gaps?.length) html += `<div style="font-size:0.75rem;color:var(--muted);margin-bottom:0.35rem;">GAPS</div><ul class="gap-list">${v.gaps.map(g => `<li class="gap-item"><b>${g.field}:</b> ${g.reason}</li>`).join('')}</ul>`;
      if (v.warnings?.length) html += `<div style="font-size:0.75rem;color:var(--muted);margin-top:0.65rem;margin-bottom:0.35rem;">WARNINGS</div><ul class="warn-list">${v.warnings.map(w => `<li class="warn-item">⚠ ${w}</li>`).join('')}</ul>`;
      document.getElementById('verificationCard').innerHTML = html;

      document.getElementById('result').style.display = 'block';
    }

    function setLoading(on) {
      document.getElementById('loading').style.display = on ? 'block' : 'none';
      document.getElementById('submitBtn').disabled = on;
    }
    function showError(msg) { const b = document.getElementById('errorBox'); b.textContent = '⚠ ' + msg; b.style.display = 'block'; }
    function hideError() { document.getElementById('errorBox').style.display = 'none'; }

    checkHealth();
    setInterval(checkHealth, 15000);
  </script>
</body>
</html>
